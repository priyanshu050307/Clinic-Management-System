<script>
  // Get session token: from in-page __CMS_TOKEN__ (after login replace) or from URL (?session=xxx).
  function getSessionToken() {
    if (typeof window.__CMS_TOKEN__ !== 'undefined' && window.__CMS_TOKEN__) return window.__CMS_TOKEN__;
    var params = new URLSearchParams(window.location.search);
    return params.get('session') || '';
  }
  // After login: fetch dashboard HTML and replace page content (no redirect) so dashboard stays visible.
  function goToDashboard(token) {
    google.script.run
      .withSuccessHandler(function(html) {
        if (html && html.length > 0) {
          document.open();
          document.write(html);
          document.close();
        } else {
          redirectWithSession(token);
        }
      })
      .withFailureHandler(function() { redirectWithSession(token); })
      .getDashboardHtml(token);
  }
  // Fallback: redirect to app URL with session (used if getDashboardHtml fails or returns empty).
  function redirectWithSession(token) {
    var base = (typeof APP_BASE_URL !== 'undefined' && APP_BASE_URL) ? APP_BASE_URL : (window.location.origin + window.location.pathname);
    var sep = base.indexOf('?') >= 0 ? '&' : '?';
    window.location.href = base + sep + 'session=' + encodeURIComponent(token);
  }
  // Logout: clear session and go to login.
  function doLogout() {
    var goLogin = function() {
      var base = (typeof APP_BASE_URL !== 'undefined' && APP_BASE_URL) ? APP_BASE_URL : (window.location.origin + window.location.pathname);
      window.location.href = base;
    };
    google.script.run.withSuccessHandler(goLogin).withFailureHandler(goLogin).logout(getSessionToken());
  }
</script>
