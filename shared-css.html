<style>
  * { box-sizing: border-box; }
  body { font-family: Arial, sans-serif; font-size: 18px; line-height: 1.5; color: #333; margin: 0; padding: 16px; max-width: 800px; margin-left: auto; margin-right: auto; }
  h1 { font-size: 24px; margin-top: 0; }
  h2 { font-size: 20px; margin-top: 24px; }
  input, select, button, textarea { font-size: 18px; padding: 10px; margin: 6px 0; width: 100%; max-width: 400px; }
  button { cursor: pointer; background: #1a73e8; color: #fff; border: none; padding: 12px 20px; border-radius: 4px; }
  button:hover { background: #1557b0; }
  button.secondary { background: #5f6368; }
  .error { color: #c5221f; margin: 8px 0; }
  .success { color: #137333; margin: 8px 0; }
  .card { border: 1px solid #dadce0; border-radius: 8px; padding: 16px; margin: 16px 0; }
  table { width: 100%; border-collapse: collapse; font-size: 16px; }

  th { background: #f8f9fa; font-weight: bold; }

  .nav a { margin-right: 12px; color: #1a73e8; }
  label { display: block; margin-top: 12px; font-weight: bold; }
